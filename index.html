<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Crypto Liquidity Signal</title>

<style>

body{
background:#050505;
color:#00ff9c;
font-family: "Courier New", monospace;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.container{
width:500px;
height:800px;
border:2px solid #00ff9c;
padding:40px;
box-shadow:0 0 40px #00ff9c33;
position:relative;
}

.scanline{
position:absolute;
top:0;
left:0;
width:100%;
height:2px;
background:#00ff9c;
animation:scan 4s linear infinite;
}

@keyframes scan{
0%{top:0}
100%{top:100%}
}

.title{
font-size:28px;
margin-bottom:40px;
animation:flicker 2s infinite alternate;
}

@keyframes flicker{
0%{opacity:1}
100%{opacity:0.6}
}

.block{
margin:30px 0;
font-size:22px;
opacity:0;
animation:fade 1s forwards;
}

.block:nth-child(2){animation-delay:1s}
.block:nth-child(3){animation-delay:2s}
.block:nth-child(4){animation-delay:3s}
.block:nth-child(5){animation-delay:4s}

@keyframes fade{
to{opacity:1}
}

.signal{
margin-top:60px;
font-size:30px;
color:#00ff9c;
text-shadow:0 0 20px #00ff9c;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.05)}
100%{transform:scale(1)}
}

.chart{
position:absolute;
bottom:40px;
left:40px;
right:40px;
height:150px;
border-left:2px solid #00ff9c;
border-bottom:2px solid #00ff9c;
}

.line{
position:absolute;
bottom:0;
left:0;
width:0%;
height:2px;
background:#00ff9c;
animation:chart 5s linear forwards;
}

@keyframes chart{
0%{width:0%}
100%{width:100%}
}

</style>
</head>

<body>

<div class="container">

<div class="scanline"></div>

<div class="title">
MARKET SIGNAL DETECTED
</div>

<div class="block">
ETF FLOWS ↑
</div>

<div class="block">
STABLECOIN SUPPLY ↑
</div>

<div class="block">
OPEN INTEREST ↑
</div>

<div class="block">
MARKET POSITIONING...
</div>

<div class="signal">
PRICE REACTION INCOMING
</div>

<div class="chart">
<div class="line"></div>
</div>

</div>

</body>
</html>
